<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空きシフト一覧 | 陽気スポジョブ ようき</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2D5A8E;--primary-light:#4A8FD4;
  --green:#4CAF7D;--green-light:#E8F5E9;
  --orange:#FF8C42;--orange-light:#FFF3E8;
  --red:#E8594F;--red-light:#FFEBEE;
  --gold:#D4A017;--gold-light:#FBF3DC;
  --line:#06C755;
  --bg:#F7F9FC;--white:#FFFFFF;
  --text:#1A1A2E;--text-mid:#4A4A68;--text-light:#8888A0;
}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;background:#E8EDF3;color:var(--text);display:flex;flex-direction:column;align-items:center;padding:16px 6px;-webkit-font-smoothing:antialiased;}

/* ── PHONE FRAME ── */
.phone{width:100%;max-width:412px;background:var(--bg);border-radius:32px;overflow:hidden;box-shadow:0 20px 60px rgba(45,90,142,.18),0 4px 12px rgba(0,0,0,.06);position:relative;min-height:840px;}

/* ── LINE TOP BAR ── */
.line-bar{background:var(--line);color:#fff;font-size:12px;font-weight:700;padding:7px 16px;display:flex;align-items:center;gap:6px;}
.line-bar .dot{width:8px;height:8px;border-radius:50%;background:#fff;}

/* ── HEADER ── */
.header{background:var(--white);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(45,90,142,.08);position:sticky;top:0;z-index:30;}
.brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.brand .mark{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#2D5A8E,#4A8FD4);display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand .t{font-size:15px;font-weight:900;line-height:1.15;white-space:nowrap;}
.brand .t span{display:block;font-size:9px;font-weight:500;color:var(--text-light);letter-spacing:1px;}
.bell{flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;}
.bell::after{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--white);}

/* ── OTOKU HERO ── */
.hero{background:linear-gradient(135deg,#2D5A8E 0%,#4A8FD4 55%,#6FC8DD 100%);color:#fff;padding:20px 18px 22px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Ccircle cx='20' cy='20' r='3'/%3E%3C/g%3E%3C/svg%3E");}
.hero .badge{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:10px;position:relative;}
.hero h1{font-size:21px;font-weight:900;line-height:1.4;position:relative;z-index:1;}
.hero h1 em{font-style:normal;color:#FFE08A;}
.hero .sub{font-size:11.5px;opacity:.92;margin-top:6px;position:relative;z-index:1;}

/* ── BONUS CARD ── */
.bonus{background:var(--white);margin:-14px 14px 0;border-radius:16px;padding:14px 16px;box-shadow:0 6px 20px rgba(0,0,0,.06);position:relative;z-index:5;border:1.5px solid var(--gold-light);}
.bonus-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px;}
.bonus-top .lbl{font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.bonus-top .lbl .ic{color:var(--gold);}
.bonus-top .goal{flex:0 0 auto;font-size:10.5px;font-weight:800;color:var(--gold);background:var(--gold-light);padding:4px 10px;border-radius:12px;white-space:nowrap;}
.bar-bg{height:11px;background:#EEF0F4;border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#E6B422,#F5D061);width:68%;}
.bonus-foot{display:flex;justify-content:space-between;gap:8px;font-size:11px;font-weight:600;color:var(--text-mid);margin-top:8px;white-space:nowrap;}
.bonus-foot b{color:var(--gold);}

/* ── FILTER CHIPS ── */
.filters{display:flex;gap:8px;overflow-x:auto;padding:16px 14px 6px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;font-size:12px;font-weight:700;padding:8px 15px;border-radius:20px;background:var(--white);color:var(--text-mid);border:1.5px solid rgba(45,90,142,.12);white-space:nowrap;}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ── LIST ── */
.list{padding:8px 14px 90px;}
.day-label{font-size:11px;font-weight:800;color:var(--text-light);letter-spacing:1px;margin:14px 4px 8px;}

.card{background:var(--white);border-radius:18px;padding:16px;margin-bottom:13px;box-shadow:0 3px 16px rgba(0,0,0,.05);border:1.5px solid rgba(0,0,0,.04);position:relative;}
.card.night{border-color:rgba(45,90,142,.18);background:linear-gradient(180deg,#FBFCFF,#F4F7FC);}
.c-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.c-fac{display:flex;align-items:center;gap:8px;}
.c-fac .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.ic.h1{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);}
.ic.h2{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);}
.ic.h3{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);}
.c-fac .nm{font-size:13.5px;font-weight:800;line-height:1.2;}
.c-fac .nm small{display:block;font-size:10px;font-weight:500;color:var(--text-light);}
.seats{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:12px;background:var(--green-light);color:var(--green);}
.seats.few{background:var(--orange-light);color:var(--orange);}

.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px;}
.tag{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:8px;}
.tag.nurse{background:#EAF1FA;color:var(--primary);}
.tag.care{background:var(--green-light);color:var(--green);}
.tag.night{background:#23304A;color:#FFE08A;}

.c-time{font-size:12.5px;font-weight:700;color:var(--text-mid);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.c-time .dt{font-weight:900;color:var(--text);}

.pay-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg);border-radius:13px;padding:12px 14px;margin-bottom:9px;}
.pay{flex:0 0 auto;min-width:0;}
.pay .yen{font-size:24px;font-weight:900;color:var(--primary);line-height:1;white-space:nowrap;}
.pay .yen small{font-size:12px;font-weight:700;}
.duty{font-size:11.5px;color:var(--text-mid);font-weight:600;margin:0 2px 12px;display:flex;align-items:center;gap:6px;}
.duty::before{content:'📝';font-size:12px;}
.otoku{flex:0 0 auto;text-align:right;}
.otoku .pill{display:inline-block;background:linear-gradient(135deg,#FF8C42,#FFB066);color:#fff;font-size:11px;font-weight:900;padding:5px 11px;border-radius:20px;box-shadow:0 3px 8px rgba(255,140,66,.3);white-space:nowrap;}
.otoku .note{font-size:9.5px;color:var(--text-light);margin-top:5px;font-weight:600;white-space:nowrap;}
.otoku .note s{color:var(--text-light);}

.apply{display:block;width:100%;text-align:center;background:var(--line);color:#fff;font-size:14px;font-weight:900;padding:13px;border-radius:13px;border:none;font-family:inherit;box-shadow:0 4px 12px rgba(6,199,85,.28);letter-spacing:1px;}
.apply .li{font-weight:700;font-size:11px;opacity:.9;}

/* ── CALENDAR ── */
.cal-wrap{padding:6px 12px 90px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 12px;}
.cal-nav button{width:40px;height:40px;border:none;background:var(--white);border-radius:13px;font-size:22px;font-weight:900;color:var(--primary);box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;line-height:1;}
.cal-title{font-size:17px;font-weight:900;text-align:center;line-height:1.2;}
.cal-title small{display:block;font-size:10.5px;font-weight:700;color:var(--text-light);margin-top:2px;}
.cal{background:var(--white);border-radius:18px;padding:12px 8px;box-shadow:0 3px 16px rgba(0,0,0,.05);border:1.5px solid rgba(0,0,0,.04);}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-wk span{text-align:center;font-size:11px;font-weight:800;color:var(--text-light);}
.cal-wk span.sun{color:var(--red);}
.cal-wk span.sat{color:var(--primary-light);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cell{min-width:0;height:52px;border:none;background:transparent;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;gap:3px;font-family:inherit;cursor:pointer;}
.cell:disabled{cursor:default;}
.cell.empty{visibility:hidden;}
.cell .dnum{font-size:13px;font-weight:700;color:var(--text-mid);width:23px;height:23px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cell.has{background:#EAF1FA;}
.cell.has .dnum{color:var(--primary);font-weight:900;}
.cell.today .dnum{background:var(--primary);color:#fff;font-weight:900;}
.cell .dots{display:flex;gap:3px;height:7px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot.nurse{background:var(--primary-light);}
.dot.care{background:var(--green);}
.dot.night{background:#23304A;}
.cal-legend{display:flex;justify-content:center;gap:16px;margin:14px 0 4px;font-size:11.5px;font-weight:700;color:var(--text-mid);}
.cal-legend span{display:flex;align-items:center;gap:5px;}
.cal-legend i{width:8px;height:8px;border-radius:50%;}
.cal-hint{text-align:center;font-size:11px;color:var(--text-light);font-weight:600;margin-top:8px;line-height:1.5;}
.day-cards{max-height:60vh;overflow-y:auto;margin-bottom:6px;}

/* ── BOTTOM NAV ── */
.nav{position:sticky;bottom:0;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid rgba(45,90,142,.1);display:flex;justify-content:space-around;padding:9px 0 12px;}
.nav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--text-light);text-decoration:none;}
.nav a .i{font-size:19px;}
.nav a.on{color:var(--primary);}

.mocknote{max-width:400px;margin:14px auto 0;font-size:11px;color:#6a7a90;text-align:center;line-height:1.6;}
.empty{text-align:center;color:var(--text-light);font-size:13px;font-weight:700;padding:48px 16px;}
.apply.done{background:#E7F6EC;color:var(--green);box-shadow:none;}
.apply:disabled{opacity:.6;box-shadow:none;}
#toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:12.5px;font-weight:700;padding:11px 20px;border-radius:24px;opacity:0;transition:all .3s;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.28);max-width:88%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* タブ共通 */
.vhead{font-size:15px;font-weight:900;padding:18px 16px 8px;}
/* 応募中 */
.arow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--white);margin:0 14px 11px;border-radius:14px;padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.04);border:1.5px solid rgba(0,0,0,.04);}
.arow .ad{font-size:13px;font-weight:800;}
.arow .at{font-size:11.5px;color:var(--text-mid);font-weight:600;margin-top:3px;}
.stb{flex:0 0 auto;font-size:11px;font-weight:800;padding:5px 12px;border-radius:14px;white-space:nowrap;}
.st-ok{background:var(--green-light);color:var(--green);}
.st-wait{background:var(--orange-light);color:var(--orange);}
.st-ng{background:#EEF0F4;color:var(--text-light);}
/* ボーナス */
.bcard{background:var(--white);margin:0 14px 14px;border-radius:18px;padding:22px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.05);border:1.5px solid #FBF3DC;}
.bbig{font-size:44px;font-weight:900;color:var(--gold);line-height:1;}
.bbig small{font-size:16px;font-weight:800;}
.blbl{font-size:12px;font-weight:700;color:var(--text-light);margin:4px 0 16px;}
.bbar{height:14px;background:#EEF0F4;border-radius:10px;overflow:hidden;}
.bbarf{height:100%;background:linear-gradient(90deg,#E6B422,#F5D061);border-radius:10px;}
.bfoot{font-size:12.5px;font-weight:700;color:var(--text-mid);margin-top:12px;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 14px 14px;}
.bg{background:var(--white);border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.bgn{font-size:24px;font-weight:900;color:var(--primary);}
.bgn small{font-size:12px;}
.bgl{font-size:11px;font-weight:700;color:var(--text-light);margin-top:5px;}
.bnote{font-size:11px;color:var(--text-light);font-weight:600;margin:0 16px;line-height:1.6;}
/* マイページ */
.mp-card{display:flex;align-items:center;gap:14px;background:var(--white);margin:0 14px 14px;border-radius:18px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.mp-ava{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#E3F2FD,#BBDEFB);display:flex;align-items:center;justify-content:center;font-size:26px;}
.mp-name{font-size:17px;font-weight:900;}
.mp-job{font-size:12px;font-weight:700;color:var(--text-light);margin-top:2px;}
.mp-btn{display:block;text-align:center;margin:0 14px 12px;padding:13px;border-radius:12px;font-size:14px;font-weight:800;text-decoration:none;background:#EAF1FA;color:var(--primary);border:none;font-family:inherit;cursor:pointer;}
.mp-btn.out{background:#fff;color:var(--text-light);border:1.5px solid rgba(45,90,142,.14);}
/* 確認ボトムシート */
.sheet{position:fixed;inset:0;background:rgba(20,20,40,.45);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.sheet.show{display:flex;}
.sheet-card{width:100%;max-width:412px;background:#fff;border-radius:22px 22px 0 0;padding:22px 20px 28px;box-shadow:0 -8px 30px rgba(0,0,0,.2);animation:shUp .25s ease;max-height:90vh;overflow-y:auto;}
@keyframes shUp{from{transform:translateY(40px);opacity:.5;}to{transform:none;opacity:1;}}
.sh-title{font-size:17px;font-weight:900;text-align:center;margin-bottom:14px;}
.sh-detail{background:var(--bg);border-radius:14px;padding:12px 16px;margin-bottom:16px;}
.sh-row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;color:var(--text-mid);font-weight:600;}
.sh-row b{color:var(--text);font-weight:800;text-align:right;}
.sh-note{font-size:12.5px;color:var(--text-mid);text-align:center;margin-bottom:16px;font-weight:600;line-height:1.6;}
.sh-icon{text-align:center;font-size:46px;margin-bottom:6px;}
.sh-btn{display:block;width:100%;text-align:center;font-family:inherit;font-size:15px;font-weight:900;padding:14px;border-radius:13px;border:none;margin-top:10px;cursor:pointer;}
.sh-btn.primary{background:var(--line);color:#fff;box-shadow:0 4px 12px rgba(6,199,85,.3);}
.sh-btn.danger{background:#E8594F;color:#fff;}
.sh-btn.ghost{background:#fff;color:var(--text-light);border:1.5px solid rgba(45,90,142,.14);}
/* ローディング */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:110;}
.loading.show{display:flex;}
.spin{width:44px;height:44px;border:4px solid #DCE4EE;border-top-color:var(--line);border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.loading .lmsg{font-size:13px;font-weight:800;color:var(--text-mid);}
/* 応募中タブの取消 */
.aright{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.cxl{font-family:inherit;font-size:11px;font-weight:800;color:var(--red);background:#fff;border:1.5px solid rgba(232,89,79,.4);border-radius:9px;padding:5px 12px;cursor:pointer;}
</style>
</head>
<body>
<div class="phone">

  <!-- LINE bar -->
  <div class="line-bar"><span class="dot"></span>LINE で開いています ・ ようき公式</div>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="mark">🤝</div>
      <div class="t">陽気スポジョブ<span>YOUKI SPOT WORK</span></div>
    </div>
    <div class="bell">🔔</div>
  </div>

  <div class="view" id="view-shifts">
  <!-- Hero -->
  <div class="hero">
    <span class="badge">⚡ 手数料0円・100時間で2万円</span>
    <h1>働くほどお得。<br><em>100時間で2万円</em>ボーナス。</h1>
    <div class="sub">看護師 時給¥2,000／介護¥1,400／夜勤¥1,500 ・ 100時間ごとに¥20,000ボーナス</div>
  </div>

  <!-- Bonus progress -->
  <div class="bonus">
    <div class="bonus-top">
      <div class="lbl"><span class="ic">🎁</span>ボーナスまであと少し</div>
      <div class="goal">100時間で¥20,000</div>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bFill"></div></div>
    <div class="bonus-foot"><span>累計 <b id="bHours">68時間</b></span><span id="bNext">あと<b>32時間</b>で¥20,000🎉</span></div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <div class="chip on" data-f="all">すべて</div>
    <div class="chip" data-f="看護師">看護師</div>
    <div class="chip" data-f="介護">介護</div>
    <div class="chip" data-f="夜勤">介護夜勤</div>
  </div>

  <!-- Calendar (rendered by JS from GAS shifts API, sample fallback) -->
  <div class="cal-wrap" id="calWrap"></div>
  </div><!-- /view-shifts -->

  <div class="view" id="view-applied" style="display:none"></div>
  <div class="view" id="view-bonus" style="display:none"></div>
  <div class="view" id="view-mypage" style="display:none"></div>

  <!-- Bottom nav -->
  <div class="nav">
    <a class="on" data-tab="shifts"><span class="i">📋</span>シフト</a>
    <a data-tab="applied"><span class="i">✋</span>応募中</a>
    <a data-tab="bonus"><span class="i">🎁</span>ボーナス</a>
    <a data-tab="mypage"><span class="i">👤</span>マイページ</a>
  </div>

</div>
<div class="mocknote" id="mocknote">※ サンプル表示中。GAS（spojob-backend）とLIFFを設定すると、実データ・LINE応募で動きます。</div>
<div id="toast"></div>
<div id="sheet" class="sheet" onclick="if(event.target===this)closeSheet()"><div class="sheet-card" id="sheetBody"></div></div>
<div id="loading" class="loading"><div class="spin"></div><div class="lmsg" id="lmsg">送信中…</div></div>

<script src="../scripts/spojob-config.js"></script>
<script>
const CFG = window.SPOJOB_CONFIG || {};
const GAS = CFG.gasUrl || '', LIFF_ID = CFG.liffId || '';
let UID = null, ALL = [], FILTER = 'all', MY = null, VIEW_YM = null;

const SAMPLE = [
  {shift_id:'s1',service:'訪問看護',date:'2026-06-20',pattern:'午前',start:'8:00',end:'13:00',job:'看護師',night:false,oncall:false,wage:2000,duty:'服薬管理・バイタル・処置',seats:1,applied:false},
  {shift_id:'s2',service:'訪問介護ようき',date:'2026-06-21',pattern:'夜勤',start:'16:30',end:'翌8:30',job:'介護',night:true,oncall:false,wage:1500,duty:'見守り・排泄・記録',seats:2,applied:false,timenote:'（16時間・仮眠あり）'},
  {shift_id:'s3',service:'訪問介護ようき',date:'2026-06-22',pattern:'日勤(通し)',start:'8:00',end:'17:00',job:'介護',night:false,oncall:false,wage:1400,duty:'入浴介助・食事・レク',seats:1,applied:false,timenote:'（休憩60分）'},
  {shift_id:'s4',service:'訪問看護',date:'2026-06-22',pattern:'午後',start:'13:00',end:'18:00',job:'看護師',night:false,oncall:false,wage:2000,duty:'バイタル・服薬・処置',seats:1,applied:false},
  {shift_id:'s5',service:'訪問看護',date:'2026-06-25',pattern:'午前',start:'8:00',end:'13:00',job:'看護師',night:false,oncall:false,wage:2000,duty:'バイタル・処置',seats:2,applied:false},
  {shift_id:'s6',service:'訪問介護ようき',date:'2026-06-25',pattern:'早番',start:'6:00',end:'13:00',job:'介護',night:false,oncall:false,wage:1400,duty:'起床介助・朝食・整容',seats:1,applied:false},
  {shift_id:'s7',service:'訪問介護ようき',date:'2026-06-27',pattern:'夜勤',start:'16:30',end:'翌8:30',job:'介護',night:true,oncall:false,wage:1500,duty:'見守り・排泄・記録',seats:1,applied:false,timenote:'（16時間・仮眠あり）'},
  {shift_id:'s8',service:'訪問看護',date:'2026-06-28',pattern:'1日',start:'8:00',end:'17:00',job:'看護師',night:false,oncall:false,wage:2000,duty:'バイタル・服薬・処置・記録',seats:1,applied:false},
  {shift_id:'s9',service:'訪問介護ようき',date:'2026-06-30',pattern:'遅番',start:'13:00',end:'18:00',job:'介護',night:false,oncall:false,wage:1400,duty:'入浴介助・レク・夕食',seats:2,applied:false}
];
const MYPAGE = {registered:true,name:'陽気 花子',job:'看護師',total_hours:68,bonus_count:0,to_next:32,
  applications:[
    {apply_id:'a1',shift_id:'',status:'承認',date:'2026-06-15',pattern:'午前',start:'8:00',end:'13:00',wage:2000},
    {apply_id:'a2',shift_id:'s1',status:'応募中',date:'2026-06-20',pattern:'午前',start:'8:00',end:'13:00',wage:2000},
    {apply_id:'a3',shift_id:'',status:'却下',date:'2026-06-10',pattern:'午後',start:'13:00',end:'18:00',wage:2000}
  ]};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function gasGet(p){return fetch(GAS+'?'+new URLSearchParams(p)).then(r=>r.json());}
function gasPost(b){return fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(b)}).then(r=>r.json());}
function fmtDate(iso){const d=new Date(iso+'T00:00:00');const w=['日','月','火','水','木','金','土'][d.getDay()];return `${d.getMonth()+1}月${d.getDate()}日（${w}）`;}
function base(job){return job==='看護師'?2000:1300;}

function cardHTML(s){
  const jobCls=s.job==='看護師'?'nurse':'care';
  const patTag=s.night?`<span class="tag night">🌙 ${s.pattern||'夜勤'}</span>`:`<span class="tag">${s.pattern||''}</span>`;
  let otoku;
  if(s.night)otoku=`<span class="pill">夜勤プレミア</span><div class="note">日勤より +¥100/時</div>`;
  else if(s.oncall)otoku=`<span class="pill">待機＋実働</span><div class="note">待機手当あり</div>`;
  else{const diff=s.wage-base(s.job);otoku=diff>0?`<span class="pill">+¥${diff} お得</span><div class="note"><s>シェアフル ¥${base(s.job).toLocaleString()}</s></div>`:`<span class="pill">🎁 100hで2万円</span><div class="note">＋ボーナス特典</div>`;}
  const seatsCls=s.seats<=1?'seats few':'seats';
  const btn=s.applied?`<button class="apply done">✓ 応募済み</button>`
    :`<button class="apply" onclick="doApply('${s.shift_id}')">応募する <span class="li">▶ LINEでかんたん</span></button>`;
  return `<div class="card${s.night?' night':''}">
    <div class="c-head"><div class="c-fac"><div class="ic ${s.night?'h3':(s.job==='看護師'?'h1':'h2')}">${s.night?'🌙':(s.job==='看護師'?'🩺':'🤝')}</div><div class="nm">${s.service||s.job}</div></div><div class="${seatsCls}">残り${s.seats}名</div></div>
    <div class="tags"><span class="tag ${jobCls}">${s.job}</span>${patTag}</div>
    <div class="c-time">${s.night?'🌙':'🕗'} <span class="dt">${s.start}〜${s.end}</span>${s.timenote||''}</div>
    <div class="pay-row"><div class="pay"><div class="yen">¥${Number(s.wage).toLocaleString()}<small>/時</small></div></div><div class="otoku">${otoku}</div></div>
    <div class="duty">${s.duty||''}</div>
    ${btn}
  </div>`;
}

// FILTER（看護師/介護/夜勤）を適用した募集だけを返す
function filtered(){
  return ALL.filter(s=>{
    if(FILTER==='all')return true;
    if(FILTER==='看護師'||FILTER==='介護')return s.job===FILTER;
    if(FILTER==='夜勤')return s.night;
    return true;
  });
}
// その日の募集の職種ごとにドット（看護=青/介護=緑/夜勤=黒）
function dayDots(items){
  const set=new Set();
  items.forEach(s=>{ if(s.night)set.add('night'); else if(s.job==='看護師')set.add('nurse'); else set.add('care'); });
  return [...set].map(t=>`<span class="dot ${t}"></span>`).join('');
}
const WK=['日','月','火','水','木','金','土'];
// 初回表示する月＝一番早い募集の月（なければ今月）
function initMonth(){
  if(VIEW_YM)return;
  const ds=ALL.map(s=>s.date).filter(Boolean).sort();
  const base=ds.length?new Date(ds[0]+'T00:00:00'):new Date();
  VIEW_YM={y:base.getFullYear(),m:base.getMonth()};
}
function moveMonth(d){ let m=VIEW_YM.m+d,y=VIEW_YM.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} VIEW_YM={y,m}; renderCalendar(); }

function render(){ initMonth(); renderCalendar(); }

function renderCalendar(){
  const wrap=document.getElementById('calWrap');
  const byDate={};
  filtered().forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
  const {y,m}=VIEW_YM;
  const startW=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const t=new Date(), tStr=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  let monthCount=0;
  let cells='';
  for(let i=0;i<startW;i++)cells+=`<div class="cell empty"></div>`;
  for(let day=1;day<=days;day++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const it=byDate[ds]||[]; const has=it.length>0; monthCount+=it.length;
    cells+=`<button class="cell ${has?'has':''} ${ds===tStr?'today':''}" ${has?`onclick="openDay('${ds}')"`:'disabled'}>
      <span class="dnum">${day}</span><span class="dots">${has?dayDots(it):''}</span></button>`;
  }
  wrap.innerHTML=`
    <div class="cal-nav"><button onclick="moveMonth(-1)">‹</button>
      <div class="cal-title">${y}年${m+1}月<small>募集 ${monthCount}件</small></div>
      <button onclick="moveMonth(1)">›</button></div>
    <div class="cal">
      <div class="cal-wk">${WK.map((w,i)=>`<span class="${i===0?'sun':i===6?'sat':''}">${w}</span>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="cal-legend"><span><i class="dot nurse"></i>看護師</span><span><i class="dot care"></i>介護</span><span><i class="dot night"></i>夜勤</span></div>
    <div class="cal-hint">📅 色がついた日をタップすると、その日の募集が見られます</div>`;
}

// 日付タップ → その日の募集をボトムシートで（応募ボタン付き）
function openDay(ds){
  const items=filtered().filter(s=>s.date===ds).sort((a,b)=>String(a.start||'').localeCompare(String(b.start||'')));
  let body=`<div class="sh-title">${fmtDate(ds)}</div>`;
  body+= items.length ? `<div class="day-cards">${items.map(cardHTML).join('')}</div>`
                      : `<div class="sh-note">この日の募集はありません</div>`;
  body+=`<button class="sh-btn ghost" onclick="closeSheet()">閉じる</button>`;
  openSheet(body);
}

document.getElementById('filters').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('#filters .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');FILTER=c.dataset.f;render();
});

function openSheet(html){document.getElementById('sheetBody').innerHTML=html;document.getElementById('sheet').classList.add('show');}
function closeSheet(){document.getElementById('sheet').classList.remove('show');}
function showLoading(msg){document.getElementById('lmsg').textContent=msg||'送信中…';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

// ① 応募ボタン → まず確認シートを出す（即応募しない）
function doApply(sid){
  const s=ALL.find(x=>x.shift_id===sid); if(!s)return;
  openSheet(`<div class="sh-title">この内容で応募しますか？</div>
    <div class="sh-detail">
      <div class="sh-row"><span>日付</span><b>${fmtDate(s.date)}</b></div>
      <div class="sh-row"><span>勤務</span><b>${s.job}・${s.pattern||''}　${s.start}〜${s.end}</b></div>
      <div class="sh-row"><span>時給</span><b>¥${Number(s.wage).toLocaleString()}/時</b></div>
    </div>
    <button class="sh-btn primary" onclick="confirmApply('${sid}')">応募する</button>
    <button class="sh-btn ghost" onclick="closeSheet()">やめる</button>`);
}
async function confirmApply(sid){
  closeSheet(); showLoading('応募を送信中…');
  if(!GAS){ await wait(700); hideLoading(); markApplied(sid); successSheet(false); return; }
  if(!UID){ hideLoading(); toast('LINEログインが必要です'); return; }
  try{
    const res=await gasPost({action:'apply',line_user_id:UID,shift_id:sid});
    hideLoading();
    if(res.need_register){location.href='register.html';return;}
    if(res.status==='ok'){ markApplied(sid); successSheet(res.already); refreshMy(); }
    else toast(res.message||'応募に失敗しました');
  }catch(e){ hideLoading(); toast('通信エラー'); }
}
function markApplied(sid){ const s=ALL.find(x=>x.shift_id===sid); if(s)s.applied=true; render(); }
function successSheet(already){
  openSheet(`<div class="sh-icon">✅</div>
    <div class="sh-title">${already?'すでに応募済みです':'応募が完了しました'}</div>
    <div class="sh-note">結果はLINEでお知らせします。<br>「応募中」タブで状況の確認・取消ができます。</div>
    <button class="sh-btn primary" onclick="closeSheet()">閉じる</button>`);
}

// 取消（応募中タブから）
function cancelApp(aid,status){
  const confirmed=status==='承認';
  openSheet(`<div class="sh-title">${confirmed?'確定したシフトを取り消しますか？':'応募を取り消しますか？'}</div>
    <div class="sh-note">${confirmed?'確定済みのため、施設にも取消が伝わります。<br>体調・ご予定が変わった場合は早めにご連絡を。':'この枠への応募が取り消されます。<br>必要ならあとで応募し直せます。'}</div>
    <button class="sh-btn danger" onclick="doCancel('${aid}')">取り消す</button>
    <button class="sh-btn ghost" onclick="closeSheet()">やめる</button>`);
}
async function doCancel(aid){
  closeSheet(); showLoading('取消を送信中…');
  if(!GAS){ await wait(600); hideLoading(); setCanceled(aid); toast('応募を取り消しました'); return; }
  try{
    const res=await gasPost({action:'cancel',line_user_id:UID,apply_id:aid});
    hideLoading();
    if(res.status==='ok'){ setCanceled(aid); toast('応募を取り消しました'); refreshMy(); }
    else toast(res.message||'取消に失敗しました');
  }catch(e){ hideLoading(); toast('通信エラー'); }
}
function setCanceled(aid){
  let sid=null;
  if(MY&&MY.applications)MY.applications.forEach(a=>{if(a.apply_id===aid){a.status='キャンセル';sid=a.shift_id;}});
  if(sid){const s=ALL.find(x=>x.shift_id===sid);if(s)s.applied=false;}
  renderApplied(); render();
}

function updateBonusBar(){
  const h=(MY&&MY.total_hours)||0, next=(MY&&MY.to_next)||(100-h%100);
  document.getElementById('bHours').textContent=h+'時間';
  document.getElementById('bNext').innerHTML=`あと<b>${next}時間</b>で¥20,000🎉`;
  document.getElementById('bFill').style.width=((h%100)/100*100)+'%';
}

// 応募/取消のあとにサーバから最新のマイページ（応募一覧・累計）を取り直す
async function refreshMy(){
  if(!GAS||!UID)return;
  try{ const m=await gasGet({action:'mypage',uid:UID});
    if(m&&m.status==='ok'&&m.registered){ MY=m; updateBonusBar(); if(document.getElementById('view-applied').style.display!=='none')renderApplied(); }
  }catch(e){}
}
const STBADGE={'承認':['st-ok','✓ 確定'],'完了':['st-ok','✓ 勤務済'],'応募中':['st-wait','結果待ち'],'却下':['st-ng','見送り'],'キャンセル':['st-ng','取消']};
function renderApplied(){
  const apps=(MY&&MY.applications)||[];
  let h='<div class="vhead">✋ 応募中・確定したシフト</div>';
  if(!apps.length){h+='<div class="empty">まだ応募はありません。<br>「シフト」から気になる枠に応募してみましょう。</div>';}
  else apps.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(a=>{
    const b=STBADGE[a.status]||['st-wait',a.status];
    const cxl=(a.status==='応募中'||a.status==='承認')?`<button class="cxl" onclick="cancelApp('${a.apply_id}','${a.status}')">取消</button>`:'';
    h+=`<div class="arow"><div><div class="ad">${fmtDate(a.date)}</div><div class="at">${a.pattern||''} ${a.start}〜${a.end} ・ ¥${Number(a.wage||0).toLocaleString()}/時</div></div><div class="aright"><span class="stb ${b[0]}">${b[1]}</span>${cxl}</div></div>`;
  });
  document.getElementById('view-applied').innerHTML=h;
}
function renderBonus(){
  const h=(MY&&MY.total_hours)||0, cnt=(MY&&MY.bonus_count)||Math.floor(h/100), next=(MY&&MY.to_next)||(100-h%100);
  document.getElementById('view-bonus').innerHTML=`<div class="vhead">🎁 ボーナス</div>
    <div class="bcard">
      <div class="bbig">${h}<small>時間</small></div><div class="blbl">累計勤務時間</div>
      <div class="bbar"><div class="bbarf" style="width:${h%100}%"></div></div>
      <div class="bfoot">あと <b>${next}時間</b> で次の ¥20,000🎉</div>
    </div>
    <div class="bgrid">
      <div class="bg"><div class="bgn">${cnt}<small>回</small></div><div class="bgl">達成回数</div></div>
      <div class="bg"><div class="bgn">¥${(cnt*20000).toLocaleString()}</div><div class="bgl">獲得ボーナス</div></div>
    </div>
    <div class="bnote">100時間ごとに¥20,000。実働時間で自動集計され、達成時にLINEでお知らせします。</div>`;
}
function renderMypage(){
  const name=(MY&&MY.name)||'ゲスト', job=(MY&&MY.job)||'-', h=(MY&&MY.total_hours)||0, cnt=(MY&&MY.bonus_count)||Math.floor(h/100);
  document.getElementById('view-mypage').innerHTML=`<div class="vhead">👤 マイページ</div>
    <div class="mp-card"><div class="mp-ava">${job==='看護師'?'🩺':'🤝'}</div><div><div class="mp-name">${name}</div><div class="mp-job">${job}</div></div></div>
    <div class="bgrid">
      <div class="bg"><div class="bgn">${h}<small>h</small></div><div class="bgl">累計勤務</div></div>
      <div class="bg"><div class="bgn">¥${(cnt*20000).toLocaleString()}</div><div class="bgl">ボーナス</div></div>
    </div>
    <a class="mp-btn" href="register.html">登録情報を編集する</a>
    ${(GAS&&LIFF_ID)?'<button class="mp-btn out" onclick="doLogout()">ログアウト</button>':''}
    ${UID?`<div style="text-align:center;font-size:10px;color:#c2c2cc;margin:16px 14px 0;word-break:break-all;line-height:1.6">LINE ID（管理者設定用）<br>${UID}</div>`:''}`;
}
function doLogout(){try{if(window.liff&&liff.logout)liff.logout();}catch(e){}location.reload();}

function showTab(tab){
  document.querySelectorAll('.view').forEach(v=>{v.style.display='none';});
  document.getElementById('view-'+tab).style.display='';
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('on',a.dataset.tab===tab));
  if(tab==='applied'){renderApplied();refreshMy();}
  if(tab==='bonus')renderBonus();
  if(tab==='mypage')renderMypage();
  window.scrollTo(0,0);
}
document.querySelector('.nav').addEventListener('click',e=>{const a=e.target.closest('a');if(a&&a.dataset.tab)showTab(a.dataset.tab);});

async function boot(){
  // デザイン確認用：URL末尾に #sample を付けるとLINEログイン無しでサンプル表示
  if(location.hash==='#sample'){ MY=MYPAGE;ALL=SAMPLE;render();updateBonusBar();return; }
  if(GAS&&LIFF_ID){
    showLoading('読み込み中…');
    await new Promise(res=>{const s=document.createElement('script');s.src='https://static.line-scdn.net/liff/edge/2/sdk.js';s.onload=res;s.onerror=res;document.head.appendChild(s);});
    try{
      await liff.init({liffId:LIFF_ID});
      if(!liff.isLoggedIn()){liff.login();return;}
      UID=(await liff.getProfile()).userId;
      // 管理者向け：#myid で自分のLINE IDを表示（設定シートB6に貼る用）
      if(location.hash==='#myid'){ hideLoading(); document.querySelector('.phone').innerHTML='<div style="padding:50px 24px;text-align:center"><div style="font-size:15px;font-weight:800;margin-bottom:16px">あなたのLINE ID（管理者設定用）</div><div style="font-size:13px;word-break:break-all;background:#EAF1FA;color:#2D5A8E;padding:16px;border-radius:12px;font-weight:700">'+UID+'</div><div style="font-size:12px;color:#888;margin-top:18px;line-height:1.7">この文字列を長押しでコピーし、<br>スプレッドシート「設定」シートの<br><b>B6セル</b>に貼り付けてください。</div></div>'; return; }
      document.getElementById('mocknote').style.display='none';
      const m=await gasGet({action:'mypage',uid:UID});
      if(m.status==='ok'&&!m.registered){location.href='register.html';return;}
      MY=m;
      const res=await gasGet({action:'shifts',uid:UID});
      if(res.status==='ok')ALL=res.shifts;
      hideLoading(); render();updateBonusBar();return;
    }catch(e){ hideLoading(); /* サンプルへフォールバック */ }
  }
  MY=MYPAGE;ALL=SAMPLE;render();updateBonusBar();
}
boot();
</script>
