<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スポット登録QR | 陽気スポジョブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2D5A8E;--primary-light:#4A8FD4;--green:#4CAF7D;--green-light:#E8F5E9;
  --orange:#FF8C42;--gold:#D4A017;--line:#06C755;--text:#1A1A2E;--text-mid:#4A4A68;--text-light:#8888A0;
}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;background:#E8EDF3;color:var(--text);display:flex;flex-direction:column;align-items:center;padding:24px 14px 60px;-webkit-font-smoothing:antialiased;}
.poster{width:100%;max-width:520px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 16px 50px rgba(45,90,142,.18);}
.head{background:linear-gradient(135deg,#2D5A8E,#4A8FD4 55%,#6FC8DD);color:#fff;text-align:center;padding:30px 24px 26px;position:relative;}
.head .brand{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.18);padding:7px 16px;border-radius:30px;font-size:13px;font-weight:800;letter-spacing:1px;margin-bottom:16px;}
.head h1{font-size:27px;font-weight:900;line-height:1.35;}
.head h1 em{font-style:normal;color:#FFE08A;}
.head .pay{font-size:14px;font-weight:700;margin-top:12px;opacity:.95;}
.body{padding:28px 24px 30px;text-align:center;}
.qr-wrap{display:inline-block;background:#fff;border:3px solid #EEF1F6;border-radius:20px;padding:16px;}
#qr{width:248px;height:248px;display:flex;align-items:center;justify-content:center;}
#qr svg{width:248px;height:248px;}
.scan{font-size:15px;font-weight:800;margin-top:16px;color:var(--primary);display:flex;align-items:center;justify-content:center;gap:8px;}
.scan .ln{background:var(--line);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px;}
.steps{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
.step{flex:1;min-width:120px;background:#F7F9FC;border-radius:14px;padding:14px 10px;}
.step .n{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
.step .t{font-size:12.5px;font-weight:800;line-height:1.4;}
.step .t small{display:block;font-size:10.5px;font-weight:600;color:var(--text-light);margin-top:3px;}
.perks{margin-top:22px;background:var(--green-light);border-radius:14px;padding:14px 16px;font-size:12.5px;font-weight:700;color:#2E7D52;line-height:1.7;}
.perks b{color:var(--orange);}
.url{margin-top:18px;font-size:11px;color:var(--text-light);word-break:break-all;font-weight:600;}
.btns{margin-top:18px;display:flex;gap:10px;justify-content:center;}
.btn{font-family:inherit;font-weight:800;font-size:13px;border:none;border-radius:10px;padding:11px 18px;cursor:pointer;}
.btn.print{background:var(--primary);color:#fff;}
.btn.copy{background:#EAF1FA;color:var(--primary);}
.foot{text-align:center;font-size:11px;color:var(--text-light);padding:0 24px 22px;}
.mocknote{max-width:520px;margin:14px auto 0;font-size:11px;color:#7a89a0;text-align:center;line-height:1.6;}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:12.5px;font-weight:700;padding:11px 20px;border-radius:24px;opacity:0;transition:all .3s;z-index:99;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media print{
  @page{ size:A4 portrait; margin:12mm; }
  html,body{ background:#fff !important; padding:0; margin:0; }
  *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  .poster{ box-shadow:none; max-width:100%; width:100%; border-radius:18px; page-break-inside:avoid; }
  .btns,.mocknote,#toast{ display:none !important; }
  /* A4チラシとして少し大きめに（デザインはそのまま） */
  .head{ padding:42px 30px 34px; }
  .head h1{ font-size:33px; }
  .head .pay{ font-size:16px; margin-top:14px; }
  .body{ padding:34px 30px 30px; }
  #qr, #qr svg{ width:300px; height:300px; }
  .scan{ font-size:16px; margin-top:18px; }
  .steps{ margin-top:26px; }
  .step .t{ font-size:14px; }
  .perks{ font-size:15px; margin-top:24px; padding:16px; }
  .url{ font-size:12px; margin-top:20px; }
  .foot{ font-size:11.5px; padding-bottom:24px; }
}
</style>
</head>
<body>
<div class="poster">
  <div class="head">
    <span class="brand">🤝 陽気スポジョブ</span>
    <h1>スポット勤務、<br><em>その場で30秒登録</em>。</h1>
    <div class="pay">看護師 ¥2,000／介護 ¥1,400／夜勤 ¥1,500</div>
  </div>
  <div class="body">
    <div class="qr-wrap"><div id="qr">QR生成中…</div></div>
    <div class="scan"><span class="ln">LINE</span> スマホのカメラ／LINEで読み取ってください</div>

    <div class="steps">
      <div class="step"><div class="n">1</div><div class="t">QRを読み取る<small>LINEが開きます</small></div></div>
      <div class="step"><div class="n">2</div><div class="t">かんたん登録<small>氏名・資格など</small></div></div>
      <div class="step"><div class="n">3</div><div class="t">空きシフトに応募<small>LINEで完結</small></div></div>
    </div>

    <div class="perks">⚡ 手数料0円　🎁 100時間ごとに<b>¥20,000</b>ボーナス</div>

    <div class="url" id="urlText"></div>
    <div class="btns">
      <button class="btn print" onclick="window.print()">🖨 印刷する</button>
      <button class="btn copy" onclick="copyUrl()">🔗 URLをコピー</button>
    </div>
  </div>
  <div class="foot">有限会社 陽気 ／ 訪問看護・ホームいこい ようき・デイサービスはいさい</div>
</div>
<div class="mocknote">※ QRは LIFF（LINEログイン）URLを指しています。読み取るとLINEで登録画面が開きます。</div>
<div id="toast"></div>

<script src="../scripts/spojob-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
var CFG = window.SPOJOB_CONFIG || {};
var LIFF_ID = CFG.liffId || '';
var TARGET = LIFF_ID ? ('https://liff.line.me/' + LIFF_ID) : 'https://kaigo-yoki.jp/recruit/spojob/shifts.html';
document.getElementById('urlText').textContent = TARGET;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1900);}
function copyUrl(){ if(navigator.clipboard){navigator.clipboard.writeText(TARGET).then(function(){toast('URLをコピーしました');},function(){toast(TARGET);});} else { toast(TARGET); } }

try {
  var qr = qrcode(0, 'M');
  qr.addData(TARGET);
  qr.make();
  document.getElementById('qr').innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
} catch (e) {
  document.getElementById('qr').textContent = 'QR生成に失敗しました';
}
</script>
</body>
</html>
