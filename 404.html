<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません | 訪問介護 ようき</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:linear-gradient(135deg,#FF6B9D 0%,#FF8C42 25%,#FFD23F 50%,#4ECDC4 75%,#45B7D1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.box{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-radius:32px;padding:60px 48px;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.1);}
.emoji{font-size:64px;margin-bottom:16px;display:block;}
h1{font-size:28px;font-weight:800;color:#2D3436;margin-bottom:12px;}
p{font-size:14px;color:#636E72;line-height:2;margin-bottom:32px;}
a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#FF6B9D,#FF8C42);color:#fff;padding:16px 40px;border-radius:50px;font-size:14px;font-weight:800;text-decoration:none;transition:all .25s;box-shadow:0 8px 24px rgba(255,107,157,.3);}
a:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(255,107,157,.4);}
</style>
</head>
<body>
<div class="box">
  <span class="emoji">&#x1F30A;</span>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは移動または削除された可能性があります。<br>トップページからご覧ください。</p>
  <a href="/">トップページへ戻る &#x2192;</a>
</div>
</body>
</html>
