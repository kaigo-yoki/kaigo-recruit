let current = 0;
let scores = { EI:0, SN:0, TF:0, JP:0 };
let maxScores = { EI:15, SN:15, TF:15, JP:15 };
let userName = '';

function startQuiz() {
  userName = document.getElementById('user-name').value.trim() || '診断者';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('progress-fill').style.width = (current / questions.length * 100) + '%';
  document.getElementById('progress-text').textContent = (current + 1) + ' / ' + questions.length;
  // 4段階: index 0=3点, 1=2点, 2=1点, 3=0点
  const html = `<div class="q-card">
    <span class="q-num">Q${current + 1}</span>
    <div class="q-text">${q.q}</div>
    <div class="q-options">
      ${q.a.map((text, i) => `<button class="q-btn" onclick="answer('${q.axis}',${3-i})">${text}</button>`).join('')}
    </div>
  </div>`;
  document.getElementById('content').innerHTML = html;
}

function answer(axis, val) {
  scores[axis] += val;
  current++;
  if (current < questions.length) showQuestion();
  else showResult();
}

function getType() {
  return (scores.EI >= 8 ? 'E' : 'I') + (scores.SN >= 8 ? 'S' : 'N') + (scores.TF >= 8 ? 'F' : 'T') + (scores.JP >= 8 ? 'J' : 'P');
}

function pct(axis) { return Math.round(scores[axis] / maxScores[axis] * 100); }

function showResult() {
  document.getElementById('content').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const type = getType();
  const d = typeData[type];
  const mp = d.match;

  const eiP = pct('EI'), snP = pct('SN'), tfP = pct('TF'), jpP = pct('JP');

  // 6つの適性スコア
  const cheerful = Math.min(100, Math.round((eiP * 0.5 + tfP * 0.3 + snP * 0.2)));
  const kindness = Math.min(100, Math.round((tfP * 0.6 + snP * 0.2 + eiP * 0.2)));
  const teamwork = Math.min(100, Math.round((tfP * 0.4 + eiP * 0.3 + jpP * 0.3)));
  const proactive = Math.min(100, Math.round((eiP * 0.4 + jpP * 0.3 + snP * 0.3)));
  const ambition = Math.min(100, Math.round((jpP * 0.4 + eiP * 0.3 + (100 - tfP) * 0.3)));
  const care = Math.min(100, Math.round((snP * 0.4 + tfP * 0.4 + jpP * 0.2)));

  let matchGrade, matchColor, matchMsg;
  if (mp >= 90) { matchGrade="最高"; matchColor="linear-gradient(90deg,#FF6B9D,#FF8C42,#FFD23F)"; matchMsg="あなたはようきにピッタリの人材です! 明るく温かいあなたの力が、利用者様の笑顔につながります。ぜひ一緒に働きましょう!"; }

  else if (mp >= 70) { matchGrade="良い"; matchColor="linear-gradient(90deg,#4ECDC4,#45B7D1)"; matchMsg="あなたならではの強みがようきで活かせます! 新しい視点やスキルで、チームに良い刺激を与えられるでしょう。"; }
  else { matchGrade="可能性あり"; matchColor="linear-gradient(90deg,#45B7D1,#A78BFA)"; matchMsg="介護の仕事では多様な人材が活躍しています。あなたの冷静さや分析力は、専門性を高める場面で力を発揮します!"; }

  const traits = [
    { icon:"\u2600\uFE0F", name:"明るさ", pct:cheerful, color:"#FF6B9D" },
    { icon:"\uD83D\uDC9B", name:"優しさ", pct:kindness, color:"#FF8C42" },
    { icon:"\uD83E\uDD1D", name:"協調性", pct:teamwork, color:"#FFD23F" },
    { icon:"\uD83D\uDD25", name:"積極性", pct:proactive, color:"#4ECDC4" },
    { icon:"\uD83D\uDCB0", name:"向上心", pct:ambition, color:"#45B7D1" },
    { icon:"\uD83C\uDFE5", name:"ケア適性", pct:care, color:"#A78BFA" }
  ];

  // Store for PDF
  window._result = { type, d, mp, matchGrade, matchColor, matchMsg, traits, eiP, snP, tfP, jpP, userName, cheerful, kindness, teamwork, proactive, ambition, care };

  const html = `
    <div class="result-type-card" style="background:${d.color}">
      <span class="type-code">${type}</span>
      <h2>${d.emoji} ${d.name}</h2>
      <p>${d.desc}</p>

    <div class="card" style="text-align:center">

      <div class="match-bar"><div class="match-fill" id="match-fill" style="width:0%;background:${matchColor}"></div></div>

      <div class="traits-grid">
        ${traits.map(t => `<div class="trait-item">
          <span class="trait-icon">${t.icon}</span>
          <div class="trait-name">${t.name}</div>
          <div class="trait-pct">${t.pct}%</div>
          <div class="trait-bar"><div class="trait-fill" style="width:0%;background:${t.color}"></div></div>
        </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h3>\uD83E\uDDE9 性格軸の分析</h3>
      <div class="dim-row"><div class="dim-label" style="color:#FF6B9D">外向型</div><div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:0%;background:linear-gradient(90deg,#FF6B9D,#FF8C42)" data-w="${eiP}%"></div></div><div class="dim-label-r" style="color:#A78BFA">内向型</div></div>
      <div class="dim-row"><div class="dim-label" style="color:#FF8C42">感覚型</div><div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:0%;background:linear-gradient(90deg,#FF8C42,#FFD23F)" data-w="${snP}%"></div></div><div class="dim-label-r" style="color:#45B7D1">直感型</div></div>
      <div class="dim-row"><div class="dim-label" style="color:#4ECDC4">感情型</div><div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:0%;background:linear-gradient(90deg,#4ECDC4,#45B7D1)" data-w="${tfP}%"></div></div><div class="dim-label-r" style="color:#636E72">思考型</div></div>
      <div class="dim-row"><div class="dim-label" style="color:#A78BFA">計画型</div><div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:0%;background:linear-gradient(90deg,#A78BFA,#FF6B9D)" data-w="${jpP}%"></div></div><div class="dim-label-r" style="color:#FFD23F">柔軟型</div></div>
    </div>

    <div class="card">
      <h3>\u2705 あなたの強み</h3>
      <ul class="strengths-list good">${d.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>

    <div class="card">
      <h3>\uD83C\uDF31 成長のヒント</h3>
      <ul class="strengths-list grow">${d.grows.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>

    <div class="card">
      <h3>\uD83C\uDF3A ようきが求める人物像</h3>
      <ul class="strengths-list good">
        <li>利用者様に<strong>明るく笑顔</strong>で接することができる</li>
        <li>チームメンバーと<strong>協力</strong>して仕事に取り組める</li>
        <li>相手の気持ちに<strong>寄り添える優しさ</strong>がある</li>
        <li><strong>積極的</strong>に学び、成長する意欲がある</li>
        <li><strong>しっかり稼ぎたい</strong>という意欲がある</li>
        <li>沖縄の<strong>温かい心</strong>で介護に向き合える</li>
      </ul>
    </div>

    <div style="text-align:center;margin-bottom:24px">
      <button class="pdf-btn" onclick="generatePDF()">\uD83D\uDCC4 診断レポートをPDFで保存</button><br>
      <button class="retry-btn" onclick="retry()">\uD83D\uDD04 もう一度診断する</button>
    </div>

    <div class="cta-card">
      <h3>まずはお気軽にお問い合わせ!</h3>
      <p>あなたの力をようきで活かしませんか?<br>見学・体験も大歓迎です!</p>
      <a href="./contact.html" class="cta-btn">\uD83D\uDCDD Webでお問い合わせ</a>
      <p class="cta-tel"><a href="tel:098-852-5255">\uD83D\uDCDE 098-852-5255</a>（電話受付 9:00〜18:00） | <a href="./">採用ページを見る</a></p>
    </div>
  `;

  const el = document.getElementById('result');
  el.innerHTML = html;
  el.style.display = 'block';
  document.getElementById('sticky-bar').style.display = 'block';

  setTimeout(() => {
    document.getElementById('match-fill').style.width = mp + '%';
    document.querySelectorAll('.trait-fill').forEach((f, i) => { f.style.width = traits[i].pct + '%'; });
    document.querySelectorAll('.dim-bar-fill').forEach(f => { f.style.width = f.dataset.w; });
  }, 300);
}

function retry() {
  current = 0; scores = {EI:0,SN:0,TF:0,JP:0};
  document.getElementById('result').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('sticky-bar').style.display = 'none';
  location.reload();
}

// ===== PDF生成 =====
async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
  const r = window._result;
  const W = 210, H = 297;

  // フォント設定（日本語は組み込みフォントでは非対応のため英語ベース + Unicode）
  doc.setFont('helvetica');

  // --- ヘッダー背景 ---
  doc.setFillColor(255, 107, 157);
  doc.rect(0, 0, W, 50, 'F');
  doc.setFillColor(255, 140, 66);
  doc.rect(0, 50, W, 3, 'F');

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(22);
  doc.text('PERSONALITY REPORT', W/2, 22, { align:'center' });
  doc.setFontSize(11);
  doc.text('Youki Career Compatibility Diagnosis', W/2, 32, { align:'center' });
  doc.setFontSize(9);
  const today = new Date().toLocaleDateString('ja-JP');
  doc.text(`Name: ${r.userName}  |  Date: ${today}`, W/2, 42, { align:'center' });

  // --- タイプ ---
  doc.setTextColor(45, 52, 54);
  doc.setFontSize(16);
  doc.text(`Type: ${r.type}`, 20, 68);
  doc.setFontSize(13);
  doc.text(r.d.name, 70, 68);

  // --- 相性 ---
  doc.setFillColor(250, 250, 250);
  doc.roundedRect(20, 75, W-40, 22, 4, 4, 'F');
  doc.setFontSize(24);
  doc.setTextColor(255, 107, 157);
  doc.text(`${r.mp}%`, 35, 90);
  doc.setFontSize(11);
  doc.setTextColor(100, 100, 100);
  doc.text(`Compatibility: ${r.matchGrade}`, 65, 88);

  // --- バー ---
  doc.setFillColor(238, 238, 238);
  doc.roundedRect(20, 100, W-40, 6, 3, 3, 'F');
  doc.setFillColor(255, 107, 157);
  doc.roundedRect(20, 100, (W-40) * r.mp / 100, 6, 3, 3, 'F');

  // --- 6つの適性 ---
  doc.setTextColor(45, 52, 54);
  doc.setFontSize(13);
  doc.text('Aptitude Scores', 20, 118);
  doc.setDrawColor(238, 238, 238);
  doc.line(20, 120, W-20, 120);

  const aptLabels = ['Cheerful', 'Kindness', 'Teamwork', 'Proactive', 'Ambition', 'Care Apt.'];
  const aptVals = [r.cheerful, r.kindness, r.teamwork, r.proactive, r.ambition, r.care];
  const aptColors = [[255,107,157],[255,140,66],[255,210,63],[78,205,196],[69,183,209],[167,139,250]];

  aptLabels.forEach((label, i) => {
    const y = 130 + i * 14;
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    doc.text(label, 22, y);
    doc.setFillColor(238, 238, 238);
    doc.roundedRect(65, y - 4, 100, 6, 3, 3, 'F');
    doc.setFillColor(...aptColors[i]);
    doc.roundedRect(65, y - 4, aptVals[i], 6, 3, 3, 'F');
    doc.setTextColor(45, 52, 54);
    doc.setFontSize(10);
    doc.text(`${aptVals[i]}%`, 170, y);
  });

  // --- 4軸分析 ---
  let yPos = 220;
  doc.setFontSize(13);
  doc.setTextColor(45, 52, 54);
  doc.text('Personality Dimensions', 20, yPos);
  doc.line(20, yPos + 2, W-20, yPos + 2);

  const dims = [
    { l:'Extrovert', r:'Introvert', p:r.eiP, c:[255,107,157] },
    { l:'Sensing', r:'Intuition', p:r.snP, c:[255,140,66] },
    { l:'Feeling', r:'Thinking', p:r.tfP, c:[78,205,196] },
    { l:'Judging', r:'Perceiving', p:r.jpP, c:[167,139,250] }
  ];

  dims.forEach((dim, i) => {
    const y = yPos + 14 + i * 14;
    doc.setFontSize(8);
    doc.setTextColor(100,100,100);
    doc.text(dim.l, 20, y);
    doc.text(dim.r, W - 20, y, { align:'right' });
    doc.setFillColor(238,238,238);
    doc.roundedRect(55, y - 4, 100, 6, 3, 3, 'F');
    doc.setFillColor(...dim.c);
    doc.roundedRect(55, y - 4, dim.p, 6, 3, 3, 'F');
    doc.text(`${dim.p}%`, 160, y);
  });

  // --- フッター ---
  doc.setFillColor(45, 52, 54);
  doc.rect(0, H - 20, W, 20, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(8);
  doc.text('Home Ikoi | Youki Home Care | TEL: 098-852-5255', W/2, H - 10, { align:'center' });
  doc.text('Okinawa, Nanjo-shi, Sashiki Tsuhako 1354-1', W/2, H - 5, { align:'center' });

  // --- ページ2: 強み・成長 ---
  doc.addPage();
  doc.setFillColor(78, 205, 196);
  doc.rect(0, 0, W, 35, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text('DETAILED ANALYSIS', W/2, 20, { align:'center' });
  doc.setFontSize(9);
  doc.text(`${r.type} - ${r.d.name}`, W/2, 28, { align:'center' });

  // 強み
  doc.setTextColor(45, 52, 54);
  doc.setFontSize(13);
  doc.text('Your Strengths', 20, 50);
  doc.line(20, 52, W-20, 52);
  r.d.strengths.forEach((s, i) => {
    doc.setFillColor(78, 205, 196);
    doc.circle(26, 60 + i * 12, 2, 'F');
    doc.setFontSize(10);
    doc.setTextColor(100, 100, 100);
    doc.text(s, 32, 62 + i * 12);
  });

  // 成長
  let gy = 60 + r.d.strengths.length * 12 + 15;
  doc.setTextColor(45, 52, 54);
  doc.setFontSize(13);
  doc.text('Growth Areas', 20, gy);
  doc.line(20, gy + 2, W-20, gy + 2);
  r.d.grows.forEach((s, i) => {
    doc.setFillColor(255, 210, 63);
    doc.circle(26, gy + 12 + i * 12, 2, 'F');
    doc.setFontSize(10);
    doc.setTextColor(100, 100, 100);
    doc.text(s, 32, gy + 14 + i * 12);
  });

  // メッセージ
  let my = gy + 12 + r.d.grows.length * 12 + 20;
  doc.setFillColor(255, 240, 245);
  doc.roundedRect(20, my, W-40, 40, 6, 6, 'F');
  doc.setFontSize(10);
  doc.setTextColor(255, 107, 157);
  doc.text('Message from Youki:', 28, my + 12);
  doc.setTextColor(100, 100, 100);
  doc.setFontSize(9);
  const lines = doc.splitTextToSize(r.matchMsg, W - 56);
  doc.text(lines, 28, my + 22);

  // フッター
  doc.setFillColor(45, 52, 54);
  doc.rect(0, H - 20, W, 20, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(8);
  doc.text('Home Ikoi | Youki Home Care | TEL: 098-852-5255', W/2, H - 10, { align:'center' });
  doc.text('https://kaigo-yoki.jp/recruit', W/2, H - 5, { align:'center' });

  doc.save(`youki-shindan-${r.type}.pdf`);
}
