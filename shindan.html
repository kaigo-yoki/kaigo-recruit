<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性格タイプ診断 | 訪問介護 ようき - あなたの適性をチェック!</title>
<meta name="description" content="16タイプ性格診断であなたと訪問介護ようきの相性をチェック！明るく温かい介護の職場に向いているか、簡単な質問で診断します。">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#FF6B9D;--orange:#FF8C42;--yellow:#FFD23F;--mint:#4ECDC4;
  --blue:#45B7D1;--purple:#A78BFA;--td:#2D3436;--tm:#636E72;--bg:#FAFAFA;
}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:var(--bg);color:var(--td);line-height:1.8;overflow-x:hidden;}

/* Header */
header{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:2px solid rgba(255,107,157,.15);padding:12px 24px;position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;}
header a{font-weight:800;font-size:14px;color:var(--pink);text-decoration:none;}
header span{font-size:11px;color:#B2BEC3;font-weight:500;}

/* Hero */
.hero{text-align:center;padding:60px 24px 40px;background:linear-gradient(135deg,#FF6B9D,#FF8C42,#FFD23F,#4ECDC4);color:#fff;}
.hero h1{font-size:clamp(24px,4vw,36px);font-weight:900;margin-bottom:12px;}
.hero p{font-size:14px;opacity:.9;max-width:500px;margin:0 auto;}

/* Container */
.container{max-width:640px;margin:0 auto;padding:32px 24px 120px;}

/* Progress */
.progress-wrap{margin-bottom:32px;display:none;}
.progress-bar{height:8px;background:#eee;border-radius:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--orange),var(--yellow),var(--mint));border-radius:8px;transition:width .4s ease;width:0%;}
.progress-text{font-size:12px;font-weight:700;color:var(--tm);margin-top:8px;text-align:center;}

/* Question Card */
.q-card{background:#fff;border-radius:24px;padding:36px 28px;border:2px solid rgba(255,107,157,.08);box-shadow:0 4px 20px rgba(0,0,0,.04);animation:fadeIn .4s ease;}
.q-num{font-size:11px;font-weight:800;color:var(--pink);background:rgba(255,107,157,.1);display:inline-block;padding:4px 14px;border-radius:50px;margin-bottom:16px;}
.q-text{font-size:18px;font-weight:800;line-height:1.6;margin-bottom:28px;color:var(--td);}
.q-options{display:flex;flex-direction:column;gap:12px;}
.q-btn{background:var(--bg);border:2px solid transparent;border-radius:16px;padding:16px 20px;font-size:14px;font-weight:700;color:var(--td);cursor:pointer;transition:all .25s;text-align:left;font-family:inherit;line-height:1.5;}
.q-btn:hover{border-color:var(--pink);background:rgba(255,107,157,.05);transform:translateX(4px);}
.q-btn:active{transform:scale(.98);}

/* Start */
.start-card{text-align:center;}
.start-card .emoji{font-size:64px;display:block;margin-bottom:16px;}
.start-card h2{font-size:22px;font-weight:900;margin-bottom:12px;}
.start-card p{font-size:14px;color:var(--tm);margin-bottom:8px;}
.start-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;padding:16px 48px;border-radius:50px;font-size:16px;font-weight:800;border:none;cursor:pointer;margin-top:24px;box-shadow:0 8px 24px rgba(255,107,157,.3);transition:all .25s;font-family:inherit;}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(255,107,157,.4);}
.features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0;text-align:left;}
.feat{background:var(--bg);border-radius:14px;padding:14px;font-size:12px;font-weight:700;color:var(--tm);display:flex;align-items:center;gap:10px;}
.feat span{font-size:20px;}

/* Result */
.result{display:none;animation:fadeIn .5s ease;}
.result-type-card{background:linear-gradient(135deg,var(--pink),var(--orange));border-radius:24px;padding:40px 28px;text-align:center;color:#fff;margin-bottom:24px;}
.result-type-card .type-code{font-size:14px;font-weight:800;background:rgba(255,255,255,.25);display:inline-block;padding:6px 20px;border-radius:50px;margin-bottom:12px;letter-spacing:.1em;}
.result-type-card h2{font-size:28px;font-weight:900;margin-bottom:8px;}
.result-type-card p{font-size:14px;opacity:.9;}

.match-card{background:#fff;border-radius:24px;padding:32px 28px;border:2px solid rgba(255,107,157,.08);margin-bottom:24px;text-align:center;}
.match-score{font-size:64px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.match-label{font-size:14px;font-weight:700;color:var(--tm);margin:8px 0 16px;}
.match-bar{height:12px;background:#eee;border-radius:12px;overflow:hidden;margin-bottom:20px;}
.match-fill{height:100%;border-radius:12px;transition:width 1s ease;}
.match-msg{font-size:15px;font-weight:700;color:var(--td);line-height:1.8;}

.traits{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.trait{background:var(--bg);border-radius:16px;padding:16px;text-align:center;}
.trait-icon{font-size:28px;display:block;margin-bottom:6px;}
.trait-name{font-size:12px;font-weight:800;color:var(--td);}
.trait-val{font-size:11px;color:var(--tm);margin-top:2px;}

.detail-card{background:#fff;border-radius:24px;padding:32px 28px;border:2px solid rgba(78,205,196,.08);margin-bottom:24px;}
.detail-card h3{font-size:16px;font-weight:800;color:var(--td);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.detail-card p{font-size:14px;color:var(--tm);line-height:2;margin-bottom:12px;}
.detail-card ul{list-style:none;padding:0;}
.detail-card li{font-size:14px;color:var(--tm);padding:8px 0;padding-left:20px;position:relative;line-height:1.7;}
.detail-card li::before{content:'';position:absolute;left:0;top:14px;width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--blue));}

.cta-card{background:linear-gradient(135deg,rgba(255,107,157,.1),rgba(255,140,66,.1));border-radius:24px;padding:36px 28px;text-align:center;border:2px solid rgba(255,107,157,.1);}
.cta-card h3{font-size:18px;font-weight:900;color:var(--td);margin-bottom:8px;}
.cta-card p{font-size:13px;color:var(--tm);margin-bottom:20px;}
.cta-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;padding:14px 36px;border-radius:50px;font-size:14px;font-weight:800;text-decoration:none;box-shadow:0 8px 24px rgba(255,107,157,.3);transition:all .25s;}
.cta-btn:hover{transform:translateY(-2px);}
.cta-tel{margin-top:12px;font-size:12px;color:var(--tm);}
.cta-tel a{color:var(--pink);text-decoration:none;font-weight:700;}

.retry-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:2px solid var(--pink);color:var(--pink);padding:12px 28px;border-radius:50px;font-size:13px;font-weight:800;cursor:pointer;margin-top:16px;font-family:inherit;transition:all .25s;}
.retry-btn:hover{background:var(--pink);color:#fff;}

/* Sticky */
.sticky-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:2px solid rgba(255,107,157,.1);padding:12px 16px;display:none;}
.sticky-bar a{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;font-weight:800;border-radius:16px;padding:14px;font-size:14px;text-decoration:none;max-width:480px;margin:0 auto;box-shadow:0 8px 24px rgba(255,107,157,.3);}

@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@media(max-width:560px){.features{grid-template-columns:1fr;}.traits{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<header>
  <a href="/">&#x2190; トップへ戻る</a>
  <span>訪問介護 ようき</span>
</header>

<div class="hero">
  <h1>&#x1F52E; 性格タイプ診断</h1>
  <p>16タイプ診断であなたと「ようき」の相性をチェックしよう!</p>
</div>

<div class="container">
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">1 / 12</div>
  </div>

  <div id="content">
    <!-- Start -->
    <div class="q-card start-card" id="start-screen">
      <span class="emoji">&#x1F422;</span>
      <h2>あなたは「ようき」に<br>向いている?</h2>
      <p>12の質問に答えるだけで、あなたの性格タイプと<br>ようきとの相性がわかります!</p>
      <div class="features">
        <div class="feat"><span>&#x23F1;</span>所要時間 約2分</div>
        <div class="feat"><span>&#x1F4CA;</span>16タイプで診断</div>
        <div class="feat"><span>&#x1F91D;</span>相性度を判定</div>
        <div class="feat"><span>&#x2705;</span>完全無料</div>
      </div>
      <button class="start-btn" onclick="startQuiz()">診断スタート &#x2192;</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result"></div>
</div>

<div class="sticky-bar" id="sticky-bar">
  <a href="tel:098-852-5255">&#x1F4DE; 098-852-5255 に電話する</a>
</div>

<script>
const questions = [
  {
    q: "休日の過ごし方は?",
    a: [
      { text: "友人や家族とワイワイ過ごす", axis: "EI", val: 1 },
      { text: "一人でゆっくりリフレッシュする", axis: "EI", val: 0 }
    ]
  },
  {
    q: "初対面の人と話すのは?",
    a: [
      { text: "楽しい! すぐに打ち解けられる", axis: "EI", val: 1 },
      { text: "少し緊張するけど、慣れれば大丈夫", axis: "EI", val: 0 }
    ]
  },
  {
    q: "グループで話し合うとき、あなたは?",
    a: [
      { text: "積極的に意見を言うタイプ", axis: "EI", val: 1 },
      { text: "まず周りの意見を聞いてから考える", axis: "EI", val: 0 }
    ]
  },
  {
    q: "仕事で大切にしたいのは?",
    a: [
      { text: "目の前の人に寄り添い、丁寧に対応すること", axis: "SN", val: 1 },
      { text: "全体の仕組みや改善点を考えること", axis: "SN", val: 0 }
    ]
  },
  {
    q: "新しいことを覚えるとき、あなたは?",
    a: [
      { text: "まずやってみて、体で覚える", axis: "SN", val: 1 },
      { text: "マニュアルを読んで、全体像を把握してから", axis: "SN", val: 0 }
    ]
  },
  {
    q: "利用者さまが元気がない様子。あなたなら?",
    a: [
      { text: "「今日はどうしました?」と声をかける", axis: "SN", val: 1 },
      { text: "そっと見守りながら、原因を考える", axis: "SN", val: 0 }
    ]
  },
  {
    q: "チームで意見が分かれたとき、あなたは?",
    a: [
      { text: "みんなの気持ちを大切にして調整する", axis: "TF", val: 1 },
      { text: "論理的に最善の方法を考えて提案する", axis: "TF", val: 0 }
    ]
  },
  {
    q: "同僚が悩んでいるとき、あなたは?",
    a: [
      { text: "まず気持ちに寄り添って話を聞く", axis: "TF", val: 1 },
      { text: "具体的な解決策を一緒に考える", axis: "TF", val: 0 }
    ]
  },
  {
    q: "感謝の言葉をもらったとき、あなたは?",
    a: [
      { text: "とても嬉しくて、もっと頑張りたくなる", axis: "TF", val: 1 },
      { text: "嬉しいけど、当然のことをしただけと思う", axis: "TF", val: 0 }
    ]
  },
  {
    q: "仕事の進め方は?",
    a: [
      { text: "予定通りにきっちり進めたい", axis: "JP", val: 1 },
      { text: "状況に応じて柔軟に対応したい", axis: "JP", val: 0 }
    ]
  },
  {
    q: "急な予定変更があったら?",
    a: [
      { text: "少し戸惑うけど、すぐに切り替える", axis: "JP", val: 1 },
      { text: "むしろ変化を楽しめるタイプ", axis: "JP", val: 0 }
    ]
  },
  {
    q: "明日の準備は?",
    a: [
      { text: "前日にしっかり準備しておく", axis: "JP", val: 1 },
      { text: "当日の朝にさっと準備する", axis: "JP", val: 0 }
    ]
  }
];

const typeData = {
  ESFJ: { name: "みんなの太陽タイプ", emoji: "&#x2600;&#xFE0F;", match: 98, desc: "思いやりにあふれ、周囲を明るくする存在。チームの調和を大切にし、相手のニーズに敏感に気づけます。", color: "linear-gradient(135deg,#FF6B9D,#FF8C42)" },
  ENFJ: { name: "情熱リーダータイプ", emoji: "&#x1F31F;", match: 95, desc: "人を導き、励ますのが得意。共感力が高く、チーム全体を前向きな方向に引っ張れます。", color: "linear-gradient(135deg,#FF8C42,#FFD23F)" },
  ESFP: { name: "ムードメーカータイプ", emoji: "&#x1F389;", match: 95, desc: "明るく活発で、その場を楽しい雰囲気にする天才。目の前の人に全力で向き合えます。", color: "linear-gradient(135deg,#FFD23F,#4ECDC4)" },
  ENFP: { name: "ひまわりタイプ", emoji: "&#x1F33B;", match: 92, desc: "好奇心旺盛で、人との関わりにエネルギーをもらえるタイプ。新しいアイデアで職場を活気づけます。", color: "linear-gradient(135deg,#4ECDC4,#45B7D1)" },
  ISFJ: { name: "縁の下の力持ちタイプ", emoji: "&#x1F33F;", match: 90, desc: "控えめながらも深い思いやりを持ち、コツコツと丁寧な仕事ができます。信頼される存在です。", color: "linear-gradient(135deg,#4ECDC4,#45B7D1)" },
  INFJ: { name: "静かな情熱タイプ", emoji: "&#x1F54A;&#xFE0F;", match: 85, desc: "深い洞察力と共感力を持ち、利用者様の気持ちに寄り添えるタイプ。静かだけど芯が強い。", color: "linear-gradient(135deg,#A78BFA,#FF6B9D)" },
  ISTJ: { name: "頼れる守護者タイプ", emoji: "&#x1F6E1;&#xFE0F;", match: 82, desc: "責任感が強く、ルールや手順をしっかり守れる。安定感があり、チームの柱になれます。", color: "linear-gradient(135deg,#45B7D1,#A78BFA)" },
  ISFP: { name: "やさしい職人タイプ", emoji: "&#x1F3A8;", match: 82, desc: "穏やかで優しく、一人ひとりに丁寧に向き合える。感性が豊かで、細やかな気配りが得意。", color: "linear-gradient(135deg,#FF6B9D,#A78BFA)" },
  ESTJ: { name: "しっかり者リーダータイプ", emoji: "&#x1F4AA;", match: 78, desc: "組織をまとめる力があり、効率的に仕事を進められます。頼りがいのある存在。", color: "linear-gradient(135deg,#FF8C42,#FFD23F)" },
  ESTP: { name: "行動派チャレンジャータイプ", emoji: "&#x26A1;", match: 78, desc: "行動力があり、緊急時にも冷静に対応できます。実践的な問題解決が得意。", color: "linear-gradient(135deg,#FFD23F,#FF8C42)" },
  INFP: { name: "理想を追う夢見るタイプ", emoji: "&#x1F308;", match: 75, desc: "深い共感力と理想を持ち、「人の役に立ちたい」という想いが強い。繊細だけど芯がある。", color: "linear-gradient(135deg,#A78BFA,#4ECDC4)" },
  ENTP: { name: "アイデア湧き出るタイプ", emoji: "&#x1F4A1;", match: 72, desc: "新しいやり方を考えるのが得意。既存の枠にとらわれず、職場に新しい風を吹き込めます。", color: "linear-gradient(135deg,#FFD23F,#4ECDC4)" },
  INTP: { name: "知的探究者タイプ", emoji: "&#x1F9E0;", match: 68, desc: "分析力が高く、物事を深く考えられる。介護の専門知識を追求し、質の高いケアを目指せます。", color: "linear-gradient(135deg,#45B7D1,#A78BFA)" },
  INTJ: { name: "戦略家タイプ", emoji: "&#x265F;&#xFE0F;", match: 68, desc: "先を見通す力があり、効率的な改善提案ができます。長期的な視点でキャリアを築けます。", color: "linear-gradient(135deg,#A78BFA,#45B7D1)" },
  ENTJ: { name: "カリスマ統率者タイプ", emoji: "&#x1F451;", match: 70, desc: "強いリーダーシップで組織を動かせる。介護現場の管理職として力を発揮できるタイプ。", color: "linear-gradient(135deg,#FF8C42,#FF6B9D)" },
  ISTP: { name: "クールな実務家タイプ", emoji: "&#x1F527;", match: 65, desc: "冷静沈着で、問題が起きても落ち着いて対処できます。実務的なスキルが高い。", color: "linear-gradient(135deg,#4ECDC4,#45B7D1)" }
};

let current = 0;
let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  const shuffled = [...q.a].sort(() => Math.random() - 0.5);
  document.getElementById('progress-fill').style.width = ((current) / questions.length * 100) + '%';
  document.getElementById('progress-text').textContent = (current + 1) + ' / ' + questions.length;

  const html = `<div class="q-card">
    <span class="q-num">Q${current + 1}</span>
    <div class="q-text">${q.q}</div>
    <div class="q-options">
      ${shuffled.map((a, i) => `<button class="q-btn" onclick="answer('${a.axis}',${a.val})">${a.text}</button>`).join('')}
    </div>
  </div>`;
  document.getElementById('content').innerHTML = html;
}

function answer(axis, val) {
  scores[axis] += val;
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function getType() {
  const e = scores.EI >= 2 ? 'E' : 'I';
  const s = scores.SN >= 2 ? 'S' : 'N';
  const f = scores.TF >= 2 ? 'F' : 'T';
  const j = scores.JP >= 2 ? 'J' : 'P';
  return e + s + f + j;
}

function showResult() {
  document.getElementById('content').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';

  const type = getType();
  const data = typeData[type];
  const matchPct = data.match;

  let matchGrade, matchColor, matchMsg;
  if (matchPct >= 90) {
    matchGrade = "最高";
    matchColor = "linear-gradient(90deg,#FF6B9D,#FF8C42,#FFD23F)";
    matchMsg = "あなたはようきにピッタリの人材です! 明るく温かいあなたの力が、利用者様の笑顔につながります。ぜひ一緒に働きましょう!";
  } else if (matchPct >= 80) {
    matchGrade = "とても良い";
    matchColor = "linear-gradient(90deg,#FF8C42,#FFD23F,#4ECDC4)";
    matchMsg = "あなたの持ち味はようきの職場で大いに活かせます! 丁寧に仕事に向き合える姿勢が、チームの力になります。";
  } else if (matchPct >= 70) {
    matchGrade = "良い";
    matchColor = "linear-gradient(90deg,#4ECDC4,#45B7D1)";
    matchMsg = "あなたならではの強みがようきで活かせます! 新しい視点やスキルで、チームに良い刺激を与えられるでしょう。";
  } else {
    matchGrade = "可能性あり";
    matchColor = "linear-gradient(90deg,#45B7D1,#A78BFA)";
    matchMsg = "介護の仕事では多様な人材が活躍しています。あなたの冷静さや分析力は、専門性を高める場面で力を発揮します!";
  }

  const youkiTraits = [
    { icon: "&#x2600;&#xFE0F;", name: "明るさ", val: scores.EI >= 2 ? "高い" : "やや控えめ" },
    { icon: "&#x1F525;", name: "積極性", val: scores.EI >= 2 && scores.JP >= 2 ? "高い" : scores.EI >= 2 || scores.JP >= 2 ? "ある" : "じっくり型" },
    { icon: "&#x1F49B;", name: "優しさ", val: scores.TF >= 2 ? "とても高い" : "理性的な優しさ" },
    { icon: "&#x1F91D;", name: "協調性", val: scores.TF >= 2 && scores.EI >= 1 ? "高い" : scores.TF >= 2 ? "ある" : "自立型" }
  ];

  const resultHTML = `
    <div class="result-type-card" style="background:${data.color}">
      <span class="type-code">${type}</span>
      <h2>${data.emoji} ${data.name}</h2>
      <p>${data.desc}</p>
    </div>

    <div class="match-card">
      <div class="match-score">${matchPct}%</div>
      <div class="match-label">ようきとの相性: ${matchGrade}</div>
      <div class="match-bar"><div class="match-fill" style="width:0%;background:${matchColor}"></div></div>
      <div class="match-msg">${matchMsg}</div>
    </div>

    <div class="traits">
      ${youkiTraits.map(t => `<div class="trait"><span class="trait-icon">${t.icon}</span><div class="trait-name">${t.name}</div><div class="trait-val">${t.val}</div></div>`).join('')}
    </div>

    <div class="detail-card">
      <h3>&#x1F33A; ようきが求める人物像</h3>
      <ul>
        <li>利用者様に<strong>明るく笑顔</strong>で接することができる</li>
        <li>チームメンバーと<strong>協力</strong>して仕事に取り組める</li>
        <li>相手の気持ちに<strong>寄り添える優しさ</strong>がある</li>
        <li><strong>積極的</strong>に学び、成長する意欲がある</li>
        <li>沖縄の<strong>温かい心</strong>で介護に向き合える</li>
        <li><strong>しっかり稼ぎたい</strong>という意欲がある</li>
      </ul>
    </div>

    <div class="detail-card">
      <h3>&#x1F4BC; ようきの魅力</h3>
      <ul>
        <li>夜勤者 月給28万〜32万円 / 日勤常勤 月給23万〜26万円</li>
        <li>資格取得は全額補助でスキルアップを応援</li>
        <li>飲みニケーション補助金 月5,000円 / ランチ補助金 月2,000円</li>
        <li>県外研修は会社が全額負担</li>
        <li>未経験OK! 丁寧なサポート体制あり</li>
      </ul>
    </div>

    <div class="cta-card">
      <h3>まずはお気軽にお問い合わせ!</h3>
      <p>あなたの力をようきで活かしませんか?<br>見学・体験も大歓迎です!</p>
      <a href="tel:098-852-5255" class="cta-btn">&#x1F4DE; 098-852-5255</a>
      <p class="cta-tel">受付 9:00〜18:00 | <a href="/">採用ページを見る</a></p>
    </div>

    <div style="text-align:center">
      <button class="retry-btn" onclick="retry()">&#x1F504; もう一度診断する</button>
    </div>
  `;

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = resultHTML;
  resultEl.style.display = 'block';
  document.getElementById('sticky-bar').style.display = 'block';

  setTimeout(() => {
    document.querySelector('.match-fill').style.width = matchPct + '%';
  }, 300);
}

function retry() {
  current = 0;
  scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
  document.getElementById('result').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('sticky-bar').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  document.getElementById('content').innerHTML = `<div class="q-card start-card" id="start-screen">
    <span class="emoji">&#x1F422;</span>
    <h2>あなたは「ようき」に<br>向いている?</h2>
    <p>12の質問に答えるだけで、あなたの性格タイプと<br>ようきとの相性がわかります!</p>
    <div class="features">
      <div class="feat"><span>&#x23F1;</span>所要時間 約2分</div>
      <div class="feat"><span>&#x1F4CA;</span>16タイプで診断</div>
      <div class="feat"><span>&#x1F91D;</span>相性度を判定</div>
      <div class="feat"><span>&#x2705;</span>完全無料</div>
    </div>
    <button class="start-btn" onclick="startQuiz()">診断スタート &#x2192;</button>
  </div>`;
}
</script>
