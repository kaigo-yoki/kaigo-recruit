<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空床状況 | ホームいこい ようき（沖縄県南城市）</title>
<meta name="description" content="有限会社 陽気が運営するホームいこい ようき 3施設の空床状況をリアルタイムでご確認いただけます。ご入居相談はお気軽にお電話ください。">
<meta name="keywords" content="空床,空室,入居,介護施設,南城市,沖縄,ホームいこい,ようき,有料老人ホーム">
<link rel="canonical" href="https://kaigo-yoki.jp/recruit/vacancy.html">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2D5A8E;--primary-light:#4A8FD4;
  --green:#4CAF7D;--green-light:#E8F5E9;
  --orange:#FF8C42;--orange-light:#FFF3E8;
  --red:#E8594F;--red-light:#FFEBEE;
  --gold:#D4A017;
  --bg:#F7F9FC;--white:#FFFFFF;
  --text:#1A1A2E;--text-mid:#4A4A68;--text-light:#8888A0;
}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* Header */
.header{background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:2px solid rgba(45,90,142,.08);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo-w{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);}
.logo-w img{height:36px;}
.logo-t{font-size:16px;font-weight:800;}
.logo-t span{display:block;font-size:10px;font-weight:400;color:var(--text-light);}
.back-link{font-size:13px;color:var(--primary);text-decoration:none;font-weight:700;padding:8px 20px;border:2px solid var(--primary);border-radius:30px;transition:all .3s;}
.back-link:hover{background:var(--primary);color:#fff;}

/* Hero */
.hero{background:linear-gradient(135deg,#2D5A8E 0%,#4A8FD4 50%,#6FC8DD 100%);padding:60px 32px 50px;text-align:center;color:#fff;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/svg%3E");}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);padding:8px 28px;border-radius:30px;font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:16px;position:relative;z-index:1;}
.hero h1{font-size:clamp(28px,5vw,42px);font-weight:900;line-height:1.3;position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.1);}
.hero p{font-size:15px;margin-top:12px;opacity:.9;position:relative;z-index:1;}
.updated{display:inline-block;background:rgba(255,255,255,.15);padding:6px 18px;border-radius:20px;font-size:12px;margin-top:16px;position:relative;z-index:1;}
.sync-indicator{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);padding:6px 16px;border-radius:20px;font-size:11px;margin-top:8px;position:relative;z-index:1;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF7D;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Main */
.main{max-width:960px;margin:0 auto;padding:40px 24px 60px;}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px;}
.summary-card{background:var(--white);border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.04);border:2px solid rgba(0,0,0,.04);}
.summary-card .label{font-size:12px;font-weight:700;color:var(--text-light);letter-spacing:1px;margin-bottom:8px;}
.summary-card .value{font-size:36px;font-weight:900;color:var(--primary);}
.summary-card .value small{font-size:14px;font-weight:500;color:var(--text-mid);}
.summary-card.highlight{border-color:var(--green);background:var(--green-light);}
.summary-card.highlight .value{color:var(--green);}

/* Facility Cards */
.facility-card{background:var(--white);border-radius:20px;padding:32px;margin-bottom:24px;box-shadow:0 4px 24px rgba(0,0,0,.05);border:2px solid rgba(0,0,0,.04);transition:transform .3s,box-shadow .3s;}
.facility-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08);}
.fc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.fc-name{display:flex;align-items:center;gap:12px;}
.fc-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.fc-icon.h1{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);}
.fc-icon.h2{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);}
.fc-icon.h3{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);}
.fc-title{font-size:20px;font-weight:800;}
.fc-title small{display:block;font-size:12px;font-weight:500;color:var(--text-light);}
.fc-status{display:flex;align-items:center;gap:8px;}
.status-badge{padding:8px 20px;border-radius:30px;font-size:13px;font-weight:800;letter-spacing:1px;}
.status-badge.available{background:var(--green-light);color:var(--green);border:2px solid rgba(76,175,125,.2);}
.status-badge.full{background:var(--red-light);color:var(--red);border:2px solid rgba(232,89,79,.2);}
.status-badge.few{background:var(--orange-light);color:var(--orange);border:2px solid rgba(255,140,66,.2);}

/* Progress bar */
.bar-wrap{margin-bottom:16px;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--text-mid);margin-bottom:8px;}
.bar-bg{height:14px;background:#EEF0F4;border-radius:10px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:10px;transition:width 1.2s ease;position:relative;}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));border-radius:10px;}
.bar-fill.green{background:linear-gradient(90deg,#66BB6A,#4CAF7D);}
.bar-fill.orange{background:linear-gradient(90deg,#FFB74D,#FF8C42);}
.bar-fill.red{background:linear-gradient(90deg,#EF5350,#E8594F);}

/* Stats grid */
.fc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fc-stat{text-align:center;padding:14px;background:var(--bg);border-radius:12px;}
.fc-stat .num{font-size:28px;font-weight:900;}
.fc-stat .unit{font-size:11px;color:var(--text-light);font-weight:700;margin-top:2px;}
.num.green{color:var(--green);}.num.blue{color:var(--primary);}.num.orange{color:var(--orange);}.num.red{color:var(--red);}

/* CTA */
.cta{background:linear-gradient(135deg,#FF6B9D 0%,#FF8C42 50%,#FFD23F 100%);border-radius:24px;padding:48px 32px;text-align:center;color:#fff;position:relative;overflow:hidden;margin-top:40px;}
.cta::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Ccircle cx='20' cy='20' r='3'/%3E%3C/g%3E%3C/svg%3E");}
.cta h2{font-size:clamp(22px,4vw,32px);font-weight:900;margin-bottom:12px;position:relative;z-index:1;}
.cta p{font-size:14px;opacity:.95;margin-bottom:24px;position:relative;z-index:1;}
.cta-phone{display:inline-flex;align-items:center;gap:10px;background:#fff;color:var(--primary);padding:16px 40px;border-radius:50px;font-size:22px;font-weight:900;text-decoration:none;box-shadow:0 6px 24px rgba(0,0,0,.15);transition:transform .3s;position:relative;z-index:1;}
.cta-phone:hover{transform:scale(1.05);}
.cta-sub{font-size:12px;margin-top:12px;opacity:.8;position:relative;z-index:1;}

/* Footer */
footer{background:#2D3436;color:rgba(255,255,255,.6);padding:32px;text-align:center;font-size:12px;}
footer a{color:rgba(255,255,255,.7);text-decoration:none;}

/* Loading */
.loading{text-align:center;padding:60px;font-size:16px;color:var(--text-light);}
.loading .spinner{width:40px;height:40px;border:4px solid #EEE;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Responsive */
@media(max-width:600px){
  .header{padding:12px 16px;}
  .hero{padding:40px 20px 36px;}
  .main{padding:24px 16px 40px;}
  .facility-card{padding:24px 20px;}
  .fc-stats{grid-template-columns:repeat(3,1fr);gap:8px;}
  .fc-stat{padding:10px 6px;}
  .fc-stat .num{font-size:22px;}
}
</style>
</head>
<body>

<div class="header">
  <a href="./" class="logo-w">
    <img src="./favicon.png" alt="ようきロゴ">
    <div class="logo-t">ホームいこい ようき<span>有限会社 陽気</span></div>
  </a>
  <a href="./" class="back-link">← 採用情報へ</a>
</div>

<div class="hero">
  <div class="hero-badge">🏠 施設空床情報</div>
  <h1>空床状況のご案内</h1>
  <p>ホームいこい ようき 各施設の現在の空き状況をご確認いただけます</p>
  <div class="updated" id="updatedDate">最終更新: 読み込み中...</div>
  <div class="sync-indicator" id="syncIndicator" style="display:none;"><span class="sync-dot"></span>介護のまな連携システム稼働中</div>
</div>

<div class="main">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    データを読み込んでいます...
  </div>

  <div id="content" style="display:none;">
    <!-- Summary -->
    <div class="summary" id="summaryCards"></div>

    <!-- Facility Cards -->
    <div id="facilityCards"></div>

    <!-- CTA -->
    <div class="cta">
      <h2>🏠 ご入居のご相談はお気軽に</h2>
      <p>施設見学も随時受け付けております。まずはお電話ください。</p>
      <a href="tel:098-852-5255" class="cta-phone">📞 098-852-5255</a>
      <div class="cta-sub">受付時間 9:00〜18:00（土日祝もご相談ください）<br>📍 沖縄県南城市佐敷津波古1354-1</div>
    </div>
  </div>
</div>

<footer>
  <a href="./">訪問介護 ようき 採用サイト</a> ｜ <a href="./admin.html">管理者ログイン</a><br>
  &copy; 2026 有限会社 陽気. All rights reserved.
</footer>

<script>
const ICONS = { HOME1: '🏠', HOME2: '🏡', HOME3: '🏘️' };
const ICON_CLASS = { HOME1: 'h1', HOME2: 'h2', HOME3: 'h3' };
const FACILITY_CAPACITY = { HOME1: 18, HOME2: 16, HOME3: 19 };
const FACILITY_NAMES = { HOME1: 'ホーム1', HOME2: 'ホーム2', HOME3: 'ホーム3' };
const AIMANA_API = 'https://asia-northeast1-aimana-8a09c.cloudfunctions.net/getCompanyData';

async function loadData() {
  try {
    // 介護のまなAPIからリアルタイムデータを取得
    const res = await fetch(AIMANA_API + '?includeInsuredPersons=true');
    const apiData = await res.json();

    if (!apiData.success || !apiData.insuredPersons) throw new Error('API error');

    // 利用中の利用者のみフィルター
    const persons = apiData.insuredPersons.filter(p => p.insuredPersonStatus === 'using');

    // 拠点ごとにカウント
    const facilities = ['HOME1', 'HOME2', 'HOME3'].map(id => ({
      id: id,
      name: FACILITY_NAMES[id],
      capacity: FACILITY_CAPACITY[id],
      occupied: persons.filter(p => p.facilityName === id).length
    }));

    const now = new Date();
    const data = {
      lastUpdated: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
      facilities: facilities
    };

    render(data);
    document.getElementById('syncIndicator').style.display = 'inline-flex';

  } catch (e) {
    // APIが利用不可の場合、vacancy.jsonにフォールバック
    try {
      const res = await fetch('./data/vacancy.json?' + Date.now());
      const data = await res.json();
      render(data);
    } catch (e2) {
      document.getElementById('loadingState').innerHTML = '<p style="color:#E8594F;">データの読み込みに失敗しました。</p>';
    }
  }
}

function render(data) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('updatedDate').textContent = '最終更新: ' + data.lastUpdated;

  const totalCap = data.facilities.reduce((s, f) => s + f.capacity, 0);
  const totalOcc = data.facilities.reduce((s, f) => s + f.occupied, 0);
  const totalVac = totalCap - totalOcc;
  const rate = Math.round((totalOcc / totalCap) * 100);

  // Summary
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card"><div class="label">全施設 合計定員</div><div class="value">${totalCap}<small>名</small></div></div>
    <div class="summary-card"><div class="label">現在の入居者数</div><div class="value">${totalOcc}<small>名</small></div></div>
    <div class="summary-card highlight"><div class="label">空き床数（合計）</div><div class="value">${totalVac}<small>床</small></div></div>
    <div class="summary-card"><div class="label">全体稼働率</div><div class="value">${rate}<small>%</small></div></div>
  `;

  // Facility cards
  const container = document.getElementById('facilityCards');
  container.innerHTML = data.facilities.map(f => {
    const vacancy = f.capacity - f.occupied;
    const pct = Math.round((f.occupied / f.capacity) * 100);
    let barClass = 'green', statusClass = 'available', statusText = `空き ${vacancy}床`;
    if (vacancy <= 0) { barClass = 'red'; statusClass = 'full'; statusText = '満 床'; }
    else if (vacancy <= 3) { barClass = 'orange'; statusClass = 'few'; statusText = `残り ${vacancy}床`; }

    return `
    <div class="facility-card">
      <div class="fc-header">
        <div class="fc-name">
          <div class="fc-icon ${ICON_CLASS[f.id]}">${ICONS[f.id]}</div>
          <div class="fc-title">${f.name}<small>ホームいこい ようき</small></div>
        </div>
        <div class="fc-status"><span class="status-badge ${statusClass}">${statusText}</span></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>稼働率</span><span>${pct}%（${f.occupied}/${f.capacity}名）</span></div>
        <div class="bar-bg"><div class="bar-fill ${barClass}" style="width:0%" data-width="${pct}%"></div></div>
      </div>
      <div class="fc-stats">
        <div class="fc-stat"><div class="num blue">${f.capacity}</div><div class="unit">定 員</div></div>
        <div class="fc-stat"><div class="num ${vacancy > 0 ? 'green' : 'red'}">${f.occupied}</div><div class="unit">入居中</div></div>
        <div class="fc-stat"><div class="num ${vacancy > 0 ? 'green' : 'red'}">${vacancy}</div><div class="unit">空き床</div></div>
      </div>
    </div>`;
  }).join('');

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width;
    });
  }, 200);
}

loadData();
</script>
</body>
</html>
