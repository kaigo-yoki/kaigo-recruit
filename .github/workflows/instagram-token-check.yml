name: Instagram トークン期限チェック

on:
  schedule:
    # 毎週日曜 JST 9:00（UTC 0:00）
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: トークン残日数を判定
        id: token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN_ISSUED_AT: ${{ vars.INSTAGRAM_TOKEN_ISSUED_AT }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: node scripts/build/check-instagram-token.js

      - name: 期限間近なら Issue を作成
        if: steps.token.outputs.should_alert == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_TITLE: ${{ steps.token.outputs.alert_title }}
          ALERT_BODY: ${{ steps.token.outputs.alert_body }}
        run: |
          existing=$(gh issue list --label instagram-token --state open --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "既存の未解決Issueがあるためスキップ"
          else
            gh issue create \
              --title "$ALERT_TITLE" \
              --body "$ALERT_BODY" \
              --label instagram-token,urgent || \
            gh issue create \
              --title "$ALERT_TITLE" \
              --body "$ALERT_BODY"
          fi
