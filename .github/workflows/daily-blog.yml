name: 📝 ブログ自動生成

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動実行も可能

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 依存関係をインストール
        run: npm install

      - name: ✍️ ブログ記事を生成
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run generate

      - name: 📤 変更をコミット & プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          # 変更がある場合のみコミット
          git diff --staged --quiet || git commit -m "📝 ブログ記事を自動生成 ($(date +'%Y-%m-%d'))"
          git push
